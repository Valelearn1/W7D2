<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini-libreria — Settimana VII Giorno I</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>La mia libreria</h1>
      <p>Aggiungi i tuoi libri e segnali come letti.</p>
    </header>

    <main class="container">
      <section class="form-section">
        <!-- form per aggiungere un libro: titolo, autore, anno, formato (cartaceo/digitale) -->
        <h2 class="fw-bold">Aggiungi un libro</h2>
        <form id="aggiungi-libro" class="form">
          <div class="campo fw-bold">
            <label for="titolo" class="form-label">Titolo</label>
            <input
              type="text"
              class="form-control"
              id="titolo"
              placeholder="Es. Il nome della rosa"
            />
          </div>
          <div class="campo fw-bold">
            <label for="autore" class="form-label">Autore</label>
            <input
              type="text"
              class="form-control"
              id="autore"
              placeholder="Es. Umberto Eco"
            />
          </div>
          <div class="campo fw-bold">
            <label for="anno" class="form-label">Anno</label>
            <input
              type="number"
              class="form-control"
              id="anno"
              placeholder="Es. 1980"
            />
          </div>
          <div class="campo fw-bold">
            <label for="formato" class="form-label">Formato</label>
            <select
              id="formato"
              class="form-select"
              aria-label="Default select example"
            >
              <option selected value=""></option>
              <option value="cartaceo">Cartaceo</option>
              <option value="digitale">Digitale</option>
            </select>
          </div>
          <div class="campo campo-condizionale" id="campo-dimensione" hidden>
            <label for="dimensione" class="form-label">Dimensione MB</label>
            <input
              type="number"
              step="0.1"
              class="form-control"
              id="dimensione"
              placeholder="Es. 2.4"
            />
          </div>
          <button type="submit" class="btn-primary">Aggiungi</button>
        </form>
      </section>

      <section class="lista-section mt-4">
        <h2>I tuoi libri (<span id="contatore">0</span>)</h2>
        <ul id="lista-libri">
          <!-- popolato da JavaScript -->
        </ul>
      </section>
    </main>

    <script src="assets/js/script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
